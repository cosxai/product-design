name: Publish @cosxai/ui

# Triggers:
#   - git tag `ui-v*` (e.g. ui-v0.1.0, ui-v0.2.0) → publish to npm
#   - manual workflow_dispatch → publish current main
#
# Authentication: npm Trusted Publishing (OIDC). No NPM_TOKEN required.
#
# One-time setup on npmjs.com:
#   1. Sign in as a maintainer of the @cosxai org
#   2. Org Settings → Trusted Publishers → Add publisher
#      - Publisher: GitHub Actions
#      - Organization: cosxai
#      - Repository:   product-design
#      - Workflow:     publish-ui.yml
#      - Environment:  (leave blank)
#      - Package name pattern: @cosxai/ui  (or @cosxai/* for the whole scope)
#   3. Done — no token to copy, no secret to paste
#
# Release flow:
#   cd product-design/packages/ui
#   # bump version in package.json (e.g. 0.1.0 → 0.2.0)
#   git commit -am "release(ui): v0.2.0"
#   git tag ui-v0.2.0
#   git push origin main --tags
#
# npm verifies the OIDC token from this workflow run matches the
# trusted-publisher config and publishes automatically with provenance.

on:
  push:
    tags:
      - 'ui-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @cosxai/ui typecheck

      - name: Publish (Trusted Publishing — OIDC, no token)
        run: pnpm publish --filter @cosxai/ui --access public --no-git-checks --provenance
